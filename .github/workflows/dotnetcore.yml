name: CloudShirt .NET CI

# Deze workflow valideert pull requests en branch pushes op twee vlakken:
# 1) Native .NET 10 restore/build/test
# 2) Docker image builds plus kwetsbaarheidsscans
on:
  push:
    branches: ["main", "NET-10"]
  pull_request:
    branches: ["main", "NET-10"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Kwaliteitspoort voor de volledige solution op .NET 10.
  build:
    name: .NET Build
    runs-on: ubuntu-latest
    outputs:
      build_warnings: ${{ steps.collect.outputs.build_warnings }}
      test_warnings: ${{ steps.collect.outputs.test_warnings }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore ./eShopOnWeb.sln

      - name: Build solution
        shell: bash
        run: |
          set -euo pipefail
          dotnet build ./eShopOnWeb.sln --configuration Release --no-restore 2>&1 | tee build.log

      - name: Test solution
        shell: bash
        run: |
          set -euo pipefail
          dotnet test ./eShopOnWeb.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" 2>&1 | tee test.log

      # Waarschuwingentellingen beschikbaar maken voor de PR-samenvatting.
      # Waarschuwingen zijn hier informatief, zodat beleid stapsgewijs strenger kan.
      - name: Collect warning counts
        id: collect
        shell: bash
        run: |
          build_warnings=$(grep -E " warning [A-Z]{2,}[0-9]{4}" build.log | wc -l || true)
          test_warnings=$(grep -E " warning [A-Z]{2,}[0-9]{4}" test.log | wc -l || true)
          echo "build_warnings=${build_warnings}" >> "$GITHUB_OUTPUT"
          echo "test_warnings=${test_warnings}" >> "$GITHUB_OUTPUT"

      - name: Upload build and test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Houdt CI-logs en testoutput beschikbaar vanuit de workflow-run.
          name: dotnet10-logs
          path: |
            build.log
            test.log
            **/*.trx

  # Security-kwaliteitspoort met Trivy scan over de repository-inhoud.
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan repository filesystem (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  # Container-kwaliteitspoort: controleer Dockerfiles en compose build.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/Web/Dockerfile
          push: false
          load: true
          tags: cloudshirt-web:ci

      - name: Build PublicApi image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/PublicApi/Dockerfile
          push: false
          load: true
          tags: cloudshirt-publicapi:ci

      - name: Build compose stack
        run: docker compose -f docker-compose.yml build

      - name: Scan Web image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: cloudshirt-web:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Scan PublicApi image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: cloudshirt-publicapi:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  # Plaatst per PR één updatebare botcomment met een snelle CI-samenvatting voor de auteur.
  pr-feedback:
    name: PR Feedback
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build
      - security
      - docker
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Post CI summary comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- cloudshirt-ci-feedback -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const buildResult = '${{ needs.build.result }}';
            const securityResult = '${{ needs.security.result }}';
            const dockerResult = '${{ needs.docker.result }}';
            const buildWarnings = '${{ needs.build.outputs.build_warnings || '0' }}';
            const testWarnings = '${{ needs.build.outputs.test_warnings || '0' }}';
            const ok = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const allGreen =
              buildResult === 'success' &&
              securityResult === 'success' &&
              dockerResult === 'success';

            const intro = allGreen
              ? `Hey @${author}, alle checks zijn groen ✅`
              : `Hey @${author}, er zijn problemen gevonden. Controleer de job logs.`;

            const body = [
              marker,
              '## CI feedback',
              '',
              intro,
              '',
              '| Job | Status |',
              '|---|---|',
              `| .NET build/test | ${ok(buildResult)} |`,
              `| Security scan (Trivy) | ${ok(securityResult)} |`,
              `| Docker build | ${ok(dockerResult)} |`,
              `| Build warnings | ${buildWarnings} |`,
              `| Test warnings | ${testWarnings} |`
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.data.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
