version: "3.8"

services:
  web:
    image: cloudshirt-dotnet-web:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      DatabaseProvider: postgres
      UseOnlyInMemoryDatabase: "false"
      ConnectionStrings__CatalogConnection: Host=db;Port=5432;Database=eshop_catalog;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      ConnectionStrings__IdentityConnection: Host=db;Port=5432;Database=eshop_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    ports:
      - target: 80
        published: 5106
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: cloudshirt-dotnet-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      DatabaseProvider: postgres
      UseOnlyInMemoryDatabase: "false"
      ConnectionStrings__CatalogConnection: Host=db;Port=5432;Database=eshop_catalog;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      ConnectionStrings__IdentityConnection: Host=db;Port=5432;Database=eshop_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    ports:
      - target: 80
        published: 5200
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - type: bind
        source: ./docker/postgres/init
        target: /docker-entrypoint-initdb.d
        read_only: true
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres-data:
